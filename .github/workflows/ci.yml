name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-host:
    name: Pi Agent Host checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
      - name: Install workspace dependencies without lifecycle scripts
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Typecheck workspaces
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Build Pi Agent Host
        run: npm run build:agent-host
      - name: Run Agent Host tests
        run: npm test
      - name: Scan for leaked credentials
        run: npm run secret-scan
      - name: Upload host diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pi-agent-host-typecheck-log
          path: typecheck.log
          if-no-files-found: error

  desktop-rust:
    name: Tauri shell check (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Compile-check the minimal Tauri shell
        shell: bash
        run: |
          set -o pipefail
          cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml 2>&1 | tee cargo-check.log
      - name: Upload cargo diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-check-macos-log
          path: cargo-check.log
          if-no-files-found: error
